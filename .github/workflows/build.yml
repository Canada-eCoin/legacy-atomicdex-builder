name: atomicdex-builder CI

on:
  workflow_dispatch:
    inputs:
      linux:
        description: Run Linux build
        type: boolean
        default: true
      macos:
        description: Run macOS Intel build
        type: boolean
        default: true
      windows:
        description: Run Windows KDF build
        type: boolean
        default: true
      wasm:
        description: Run KDF WebAssembly build
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

concurrency:
  group: atomicdex-builder-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_YES: "1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  ubuntu-release:
    if: inputs.linux
    name: Ubuntu Release
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build KDF + Desktop
        run: ./commands/build/command.sh

      - name: Show Linux outputs
        if: always()
        run: |
          echo '== output/linux =='
          ls -lah output/linux || true
          echo
          echo '== logs/linux =='
          ls -lah logs/linux || true

      - name: Upload Linux output
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-linux-output
          path: output/linux/
          retention-days: 30
          if-no-files-found: error

      - name: Upload Linux logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-linux-logs
          path: logs/linux/
          retention-days: 30
          if-no-files-found: warn

  macos-intel-release:
    if: inputs.macos
    name: macOS Intel Release
    runs-on: macos-15-intel
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5

      - name: Build KDF + Desktop
        run: ./commands/build/command.sh native --arch intel --yes

      - name: Show macOS Intel outputs
        if: always()
        run: |
          echo '== output/mac-intel =='
          ls -lah output/mac-intel || true
          echo
          echo '== logs/mac-intel =='
          ls -lah logs/mac-intel || true

      - name: Upload macOS Intel output
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-macos-intel-output
          path: output/mac-intel/
          retention-days: 30
          if-no-files-found: error

      - name: Upload macOS Intel logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-macos-intel-logs
          path: logs/mac-intel/
          retention-days: 30
          if-no-files-found: warn

  windows-release:
    if: inputs.windows
    name: Windows Release
    runs-on: windows-2022
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: 'C:\'
          modules: 'qtcharts qtwebengine'
          tools: 'tools_ifw'
          cache: true

      - name: Install protobuf + ninja
        shell: powershell
        run: |
          choco install protoc ninja -y
          "$env:ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build KDF + Desktop
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\src\build-windows.ps1 -Yes

      - name: Show Windows outputs
        if: always()
        shell: powershell
        run: |
          Write-Host '== output/windows =='
          if (Test-Path 'output/windows') { Get-ChildItem 'output/windows' }
          Write-Host ''
          Write-Host '== logs/windows =='
          if (Test-Path 'logs/windows') { Get-ChildItem 'logs/windows' }

      - name: Upload Windows output (all artifacts)
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-windows-output
          path: output/windows/
          retention-days: 30
          if-no-files-found: error

      - name: Upload Windows logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-windows-logs
          path: logs/windows/
          retention-days: 30
          if-no-files-found: warn

  wasm-kdf-release:
    if: inputs.wasm
    name: KDF WebAssembly
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build KDF → WASM
        run: ./commands/build/command.sh wasm

      - name: Show WASM outputs
        if: always()
        run: |
          echo '== output/wasm =='
          ls -lah output/wasm || true
          echo
          echo '== logs/wasm =='
          ls -lah logs/wasm || true

      - name: Upload WASM output
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-wasm-kdf-output
          path: output/wasm/
          retention-days: 30
          if-no-files-found: error

      - name: Upload WASM logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-wasm-kdf-logs
          path: logs/wasm/
          retention-days: 30
          if-no-files-found: warn
