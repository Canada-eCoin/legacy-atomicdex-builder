name: atomicdex-builder CI

on:
  workflow_dispatch:
    inputs:
      linux:
        description: Run Linux build
        type: boolean
        default: true
      macos:
        description: Run macOS Intel build
        type: boolean
        default: true
      windows:
        description: Run Windows build
        type: boolean
        default: true
      wasm:
        description: Run KDF WebAssembly build
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: write

concurrency:
  group: atomicdex-builder-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_YES: "1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  ubuntu-release:
    if: github.event_name != 'workflow_dispatch' || inputs.linux
    name: Ubuntu Release
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build KDF + Desktop
        run: ./commands/build/command.sh

      - name: Show Linux outputs
        if: always()
        run: |
          echo '== output/linux =='
          ls -lah output/linux || true
          echo
          echo '== logs/linux =='
          ls -lah logs/linux || true

      - name: Upload Linux output
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-linux-output
          path: output/linux/
          retention-days: 30
          if-no-files-found: error

      - name: Upload Linux logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-linux-logs
          path: logs/linux/
          retention-days: 30
          if-no-files-found: warn

  macos-intel-release:
    if: github.event_name != 'workflow_dispatch' || inputs.macos
    name: macOS Intel Release
    runs-on: macos-15-intel
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5

      - name: Build KDF + Desktop
        run: ./commands/build/command.sh native --arch intel --yes
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

      - name: Show macOS Intel outputs
        if: always()
        run: |
          echo '== output/mac-intel =='
          ls -lah output/mac-intel || true
          echo
          echo '== logs/mac-intel =='
          ls -lah logs/mac-intel || true

      - name: Upload macOS Intel output
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-macos-intel-output
          path: output/mac-intel/
          retention-days: 30
          if-no-files-found: error

      - name: Upload macOS Intel logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-macos-intel-logs
          path: logs/mac-intel/
          retention-days: 30
          if-no-files-found: warn

  windows-release:
    if: github.event_name != 'workflow_dispatch' || inputs.windows
    name: Windows Release
    runs-on: windows-2022
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: 'C:\'
          modules: 'qtcharts qtwebengine'
          tools: 'tools_ifw'
          cache: true

      - name: Install protobuf + ninja
        shell: powershell
        run: |
          choco install protoc ninja -y
          "$env:ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build KDF + Desktop
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\src\build-windows.ps1 -Yes

      - name: Show Windows outputs
        if: always()
        shell: powershell
        run: |
          Write-Host '== output/windows =='
          if (Test-Path 'output/windows') { Get-ChildItem 'output/windows' }
          Write-Host ''
          Write-Host '== logs/windows =='
          if (Test-Path 'logs/windows') { Get-ChildItem 'logs/windows' }

      - name: Upload Windows output (all artifacts)
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-windows-output
          path: output/windows/
          retention-days: 30
          if-no-files-found: error

      - name: Upload Windows logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-windows-logs
          path: logs/windows/
          retention-days: 30
          if-no-files-found: warn

  wasm-kdf-release:
    if: github.event_name != 'workflow_dispatch' || inputs.wasm
    name: KDF WebAssembly
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build KDF → WASM
        run: ./commands/build/command.sh wasm

      - name: Show WASM outputs
        if: always()
        run: |
          echo '== output/wasm =='
          ls -lah output/wasm || true
          echo
          echo '== logs/wasm =='
          ls -lah logs/wasm || true

      - name: Upload WASM output
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-wasm-kdf-output
          path: output/wasm/
          retention-days: 30
          if-no-files-found: error

      - name: Upload WASM logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomicdex-wasm-kdf-logs
          path: logs/wasm/
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - ubuntu-release
      - windows-release
      - macos-intel-release
      - wasm-kdf-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout for config
        uses: actions/checkout@v5
        with:
          sparse-checkout: config/sources.json

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          pattern: atomicdex-*-output

      - name: Flatten and checksum
        run: |
          mkdir -p release
          # Platform-prefix all files — basenames collide across platforms
          for dir in artifacts/atomicdex-*/; do
            label="$(echo "$dir" | sed 's|artifacts/atomicdex-||;s|-output/||')"
            find "$dir" -type f \
              ! -path '*komodo-wallet.app/*' \
              ! -name 'kdf_kwd' \
              -size +0c | while read f; do
              base="$(basename "$f")"
              # Add platform prefix unless it already has a unique name
              case "$base" in
                *.AppImage|*.dmg|*.wasm|*.js|*.json|*.zip|*.exe)
                  dest="$base" ;;
                kdf|kdf.sha256)
                  dest="${label}-${base}" ;;
                *)
                  dest="${label}-${base}" ;;
              esac
              cp "$f" "release/$dest"
              sha256sum "$f" | sed "s|$f|$dest|" > "release/$dest.sha256"
            done
          done
          echo '=== Release assets ==='
          ls -lah release/

      - name: Generate release body
        run: |
          echo "## AtomicDEX Legacy — ${{ github.ref_name }}" > release-body.md
          echo "" >> release-body.md
          echo "**Built:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> release-body.md
          echo "**Builder commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> release-body.md
          echo "" >> release-body.md
          echo "### Upstream Sources" >> release-body.md
          echo "" >> release-body.md
          echo "| Component | Source | Pinned |" >> release-body.md
          echo "|---|---|---|" >> release-body.md
          KDF_REPO=$(jq -r '.kdf.repo' config/sources.json)
          KDF_COMMIT=$(jq -r '.kdf.commit' config/sources.json)
          DESKTOP_REPO=$(jq -r '.desktop.repo' config/sources.json)
          DESKTOP_BRANCH=$(jq -r '.desktop.branch' config/sources.json)
          DESKTOP_COMMIT=$(jq -r '.desktop.commit' config/sources.json)
          QATERIAL_REPO=$(jq -r '.dependencies.qaterial.repo' config/sources.json)
          QATERIAL_COMMIT=$(jq -r '.dependencies.qaterial.commit' config/sources.json)
          COINS_REPO=$(jq -r '.dependencies.coin_configs.repo' config/sources.json)
          COINS_BRANCH=$(jq -r '.dependencies.coin_configs.branch' config/sources.json)
          echo "| KDF engine | [${KDF_REPO#https://}]($KDF_REPO) | \`$KDF_COMMIT\` |" >> release-body.md
          echo "| Desktop wallet | [${DESKTOP_REPO#https://} ($DESKTOP_BRANCH)]($DESKTOP_REPO) | \`$DESKTOP_COMMIT\` |" >> release-body.md
          echo "| Qaterial | [${QATERIAL_REPO#https://}]($QATERIAL_REPO) | \`$QATERIAL_COMMIT\` |" >> release-body.md
          echo "| Coin configs | [${COINS_REPO#https://} ($COINS_BRANCH)]($COINS_REPO) | branch \`$COINS_BRANCH\` |" >> release-body.md
          echo "| libwally-core | [github.com/ElementsProject/libwally-core](https://github.com/ElementsProject/libwally-core) | \`release_0.9.2\` |" >> release-body.md
          echo "| Qt (win/mac) | [qt.io](https://download.qt.io/archive/qt/5.15/5.15.2/) | \`5.15.2\` |" >> release-body.md
          echo "| binaryen (WASM) | [github.com/WebAssembly/binaryen](https://github.com/WebAssembly/binaryen) | \`version_120\` |" >> release-body.md
          echo "| vcpkg | pinned via desktop wallet CMake | [vcpkg.json](https://github.com/cipig/komodo-wallet-desktop/blob/$DESKTOP_COMMIT/vcpkg.json) |" >> release-body.md
          echo "" >> release-body.md
          echo "### Artifacts" >> release-body.md
          echo "" >> release-body.md
          echo '| File | Size | SHA256 |' >> release-body.md
          echo '|---|---|---|' >> release-body.md
          for f in release/*; do
            case "$f" in *.sha256) continue ;; esac
            base="$(basename "$f")"
            size="$(du -h "$f" | cut -f1)"
            sha="$(cat "release/$base.sha256" | awk '{print $1}')"
            echo "| \`$base\` | $size | \`${sha:0:16}…\` |" >> release-body.md
          done
          echo "" >> release-body.md
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release-body.md
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
